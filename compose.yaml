services:
  php:
    build: .
    ports: [ '8000:8000' ]
    volumes: [ '.:/var/www/html' ]
    depends_on: [ database ]
    environment:
      DATABASE_URL: mysql://root:root@database:3306/sympet?serverVersion=8.0
      MAILER_DSN: smtp://mailpit:1025
      APP_ENV: dev

  database:
    image: mysql:8
    environment:
      MYSQL_DATABASE: sympet
      MYSQL_ROOT_PASSWORD: root
    ports: [ '3307:3306' ]
    volumes: [ 'db_data:/var/lib/mysql' ]

  mailpit:
    image: axllent/mailpit
    ports: [ '8025:8025', '1025:1025' ]

volumes:
  db_data:
